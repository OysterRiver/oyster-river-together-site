    <style type="text/css">
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- DESKTOP LAYOUT --- */
        .wrapper {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: calc(100% - 55px); 
            overflow: hidden; 
        }

        iframe {
            width: 100%;
            height: calc(100% + 45px); 
            border: none;
            display: block;
        }

        .carousel-bar {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 55px;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0; 
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            z-index: 1000;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .carousel-count {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 6px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .carousel-content {
            flex-grow: 1;
            padding: 0 20px;
            text-align: center;
            font-size: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        .comment-text {
            font-style: italic;
            color: #475569; 
            cursor: pointer;
            transition: color 0.2s;
            display: block;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .comment-text:hover {
            color: #0f172a;
            text-decoration: underline;
        }

        .carousel-controls {
            display: flex;
            gap: 5px;
        }

        .carousel-controls button {
            background: none;
            border: none;
            color: #94a3b8; 
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .carousel-controls button:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* --- MODAL SCROLL AND OVERLAY RULES --- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.6); 
            z-index: 2000;
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(3px); 
        }

        .modal-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 85%;
            width: 650px;
        }

        .modal-content {
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            width: 100%;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
        }

        .modal-text-wrap {
            font-size: 18px;
            line-height: 1.6;
            color: #1e293b;
            font-style: italic;
        }

        .modal-close {
            position: absolute;
            top: 10px; 
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
            transition: color 0.2s;
            z-index: 2100;
        }

        .modal-close:hover {
            color: #e53e3e;
        }

        .modal-side-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #475569;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
            z-index: 2200;
        }

        .modal-side-btn:hover {
            color: #0f172a;
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .modal-side-btn.left {
            left: -60px;
        }

        .modal-side-btn.right {
            right: -60px;
        }

        .modal-mobile-controls {
            display: none;
        }

        /* --- MOBILE LAYOUT OVERRIDES --- */
        @media (max-width: 650px) {
            .wrapper {
                height: calc(100% - 80px); 
            }
            .carousel-bar {
                height: 80px; 
                flex-wrap: wrap; 
                padding: 8px 15px;
                align-content: space-between;
            }
            .carousel-count {
                order: 1; 
                font-size: 12px;
                padding: 3px 6px;
            }
            .carousel-controls {
                order: 2; 
            }
            .carousel-content {
                order: 3; 
                width: 100%;
                height: 40px; 
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center; 
                font-size: 13.5px;
                box-sizing: border-box;
            }
            .comment-text {
                white-space: normal; 
                text-align: center;
                display: -webkit-box;
                -webkit-line-clamp: 2; 
                -webkit-box-orient: vertical;
                overflow: hidden;
                text-overflow: ellipsis; 
            }
            
            /* --- STRUCTURALLY LOCKED MOBILE MODAL LAYOUT --- */
            .modal-container {
                max-width: 90%;
            }
            .modal-content {
                height: 50vh; /* FORCES STRUCTURAL RIGIDITY. THE CONTENT HEIGHT NEVER SHIFTS. */
                padding: 25px 20px 60px 20px; 
                overflow-y: auto; /* Internal text block handles scrolling inside the locked container */
                font-size: 15px;
            }
            .modal-text-wrap {
                font-size: 16px;
                display: block;
                padding-bottom: 10px;
            }
            
            .modal-side-btn {
                display: none !important;
            }
            
            /* Pinned Split Grid Footer (Never moves, buttons stay perfectly targeted) */
            .modal-mobile-controls {
                display: flex;
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 50px;
                background-color: #f8fafc;
                border-top: 1px solid #e2e8f0;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
                box-sizing: border-box;
                z-index: 2300;
            }
            .mobile-nav-btn {
                flex: 1;
                background: none;
                border: none;
                color: #475569;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .mobile-nav-btn:active {
                background-color: #f1f5f9;
            }
            .mobile-nav-btn.left-border {
                border-left: 1px solid #e2e8f0;
            }
        }
    </style>

<body>
    
    <div class="wrapper">
        <iframe id="main-form" width="100%" frameborder="0" marginheight="0" marginwidth="0" title="Vote of No Confidence in Superintendent Dr. Robert Shaps"></iframe>
    </div>

    <div class="carousel-bar">
        <div class="carousel-count">
            <span id="supporter-count">...</span>&nbsp;Supporters
        </div>
        
        <div class="carousel-content" id="active-comment">
            Loading community comments...
        </div>

        <div class="carousel-controls">
            <button id="btn-prev" title="Previous Comment">◀</button>
            <button id="btn-pause" title="Pause/Play">⏸</button>
            <button id="btn-next" title="Next Comment">▶</button>
        </div>
    </div>

    <div id="comment-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-container" onclick="event.stopPropagation()">
            
            <button class="modal-side-btn left" id="modal-btn-prev" title="Previous Comment">◀</button>
            
            <div class="modal-content">
                <span class="modal-close" onclick="closeModal()">&times;</span>
                <div id="modal-text" class="modal-text-wrap"></div>
                
                <div class="modal-mobile-controls">
                    <button class="mobile-nav-btn" id="mobile-btn-prev">◀ Previous</button>
                    <button class="mobile-nav-btn left-border" id="mobile-btn-next">Next ▶</button>
                </div>
            </div>
            
            <button class="modal-side-btn right" id="modal-btn-next" title="Next Comment">▶</button>
            
        </div>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        const _0xdata = [
            "aHR0cHM6Ly9kb2NzLmdvb2dsZS5",
            "jb20vc3ByZWFkc2hlZXRzL2QvZS",
            "8yUEFDWC0xdlRpZjlrcEZFTlRTc",
            "zEwblVpZHNfN0NLb3p2al9fZHY4",
            "ZmxienIyaHI3a1RWZGlrMGlIbDN",
            "xT1VTM0hXeHdoV05zNzNIZXZBMW",
            "lxNDUwWi9wdWI/Z2lkPTYwMTE4M",
            "jIwMyZzaW5nbGU9dHJ1ZSZvdXRw",
            "dXQ9Y3N2"
        ];
        const _0xform = [
            "aHR0cHM6Ly90YWxseS5zby9yL1",
            "BkdmpPYj90cmFuc3BhcmVudEJh",
            "Y2tncm91bmQ9MSZmb3JtRXZlbn",
            "RzRm9yd2FyZGluZz0x"
        ];
        
        const rawCsvUrl = atob(_0xdata.join(''));
        const formUrl = atob(_0xform.join(''));
        const csvUrl = rawCsvUrl + "&t=" + new Date().getTime();

        document.getElementById('main-form').setAttribute('data-tally-src', formUrl);

        let commentsArray = [];
        let currentIndex = 0;
        let carouselTimer = null;
        let isPaused = false;

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                // BYPASS ALL COLUMN HEADER INTERPRETATION LOGIC (Instantly parses raw multi-dimensional string lines)
                let parsed = Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true
                });

                const rows = parsed.data;
                
                // 1. Row 1 (Index 1 in zero-index) contains column headers. Row 2 (Index 1) has actual row data cells.
                // Row 2, Column B (Index 1) contains your numeric total summary value.
                if(rows.length > 1 && rows[1][1]) {
                    let trueCount = parseInt(rows[1][1].replace(/,/g, ''), 10);
                    if(!isNaN(trueCount)) {
                        document.getElementById('supporter-count').innerText = trueCount.toLocaleString();
                    }
                }

                // 2. Extract comments cleanly. Row 1 has headers, so we slice and scan from Row 2 down.
                // Column A (Index 0) holds all your text comments.
                for (let i = 1; i < rows.length; i++) {
                    let textCell = rows[i][0];
                    if(textCell && textCell.trim() !== '' && textCell !== 'Comments') {
                        commentsArray.push(textCell.trim());
                    }
                }

                // 3. Immediately shuffle and present the dataset with zero background engine noise
                if(commentsArray.length > 0) {
                    shuffleArray(commentsArray); 
                    currentIndex = 0;
                    showComment(currentIndex);
                    startTimer();
                } else {
                    document.getElementById('active-comment').innerHTML = "<span class='comment-text'>No comments yet.</span>";
                }
            })
            .catch(error => {
                console.error("Critical array execution block failure:", error);
                document.getElementById('active-comment').innerHTML = "<span class='comment-text'>Unable to load comments.</span>";
            });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[array[j]]] = [array[j], array[i]];
            }
        }

        function showComment(index) {
            if(commentsArray.length === 0) return;
            
            if(index >= commentsArray.length) {
                shuffleArray(commentsArray); 
                currentIndex = 0;
            } else if(index < 0) {
                currentIndex = commentsArray.length - 1;
            } else {
                currentIndex = index;
            }

            let rawComment = commentsArray[currentIndex];
            document.getElementById('active-comment').innerHTML = 
                `<span class="comment-text" onclick="openModal()" title="Click to read full comment">"${rawComment}"</span>`;
                
            if(document.getElementById('comment-modal').style.display === 'flex') {
                document.getElementById('modal-text').innerText = '"' + rawComment + '"';
                document.getElementById('.modal-content').scrollTop = 0; // Snap overflow views back to top row on next click
            }
        }

        function startTimer() {
            clearInterval(carouselTimer);
            if (isPaused || commentsArray.length === 0) return;

            carouselTimer = setInterval(() => {
                showComment(currentIndex + 1);
            }, 7000); 
        }

        function resetTimer() {
            startTimer();
        }

        function openModal() {
            clearInterval(carouselTimer);
            document.getElementById('modal-text').innerText = '"' + commentsArray[currentIndex] + '"';
            document.getElementById('comment-modal').style.display = 'flex';
            
            isPaused = true;
            document.getElementById('btn-pause').innerText = '▶';
        }

        function closeModal() {
            document.getElementById('comment-modal').style.display = 'none';
            
            isPaused = false;
            document.getElementById('btn-pause').innerText = '⏸';
            startTimer();
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
            resetTimer(); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
            resetTimer();
        });

        document.getElementById('modal-btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
        });

        document.getElementById('modal-btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
        });

        document.getElementById('mobile-btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
        });

        document.getElementById('mobile-btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? '▶' : '⏸';
            e.target.title = isPaused ? 'Play' : 'Pause';
            if (isPaused) {
                clearInterval(carouselTimer);
            } else {
                startTimer();
            }
        });
    </script>

</body>
