<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

    <meta property="og:description" content="Click here to view and sign the community petition.">
    <meta property="og:url" content="https://oysterrivertogether.com">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://oysterrivertogether.com/site_image.jpg">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vote of No Confidence in Superintendent Dr. Robert Shaps">
    <meta name="twitter:image" content="https://oysterrivertogether.com/site_image.jpg">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-69J55Z3B8G"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-69J55Z3B8G');
    </script>

    <script>
      // Tracks when someone clicks the area where the form is
      window.addEventListener('blur', function() {
        if (document.activeElement.tagName === 'IFRAME') {
          gtag('event', 'form_start_click', {
            'event_category': 'engagement',
            'event_label': 'Tally Petition Start'
          });
        }
      });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style type="text/css">
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- CAROUSEL STYLES --- */
        .carousel-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            z-index: 1000;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .carousel-count {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 6px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .carousel-content {
            flex-grow: 1;
            padding: 0 20px;
            text-align: center;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        .comment-text {
            font-style: italic;
            color: #475569; 
        }

        .carousel-controls {
            display: flex;
            gap: 5px;
        }

        .carousel-controls button {
            background: none;
            border: none;
            color: #94a3b8; 
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .carousel-controls button:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* --- PETITION WRAPPER --- */
        .wrapper {
            position: absolute;
            top: 55px; 
            left: 0;
            width: 100%;
            height: calc(100% - 55px); 
            overflow: hidden; 
        }

        iframe {
            width: 100%;
            height: calc(100% + 45px); 
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    
    <div class="carousel-bar">
        
        <div class="carousel-count">
            <span id="signature-count">...</span>&nbsp;Supporters
        </div>
        
        <div class="carousel-content" id="active-comment">
            Loading community comments...
        </div>

        <div class="carousel-controls">
            <button id="btn-prev" title="Previous Comment">◀</button>
            <button id="btn-pause" title="Pause/Play">⏸</button>
            <button id="btn-next" title="Next Comment">▶</button>
        </div>
    </div>

    <div class="wrapper">
        <iframe data-tally-src="https://tally.so/r/PdvjOb?transparentBackground=1&formEventsForwarding=1" width="100%" frameborder="0" marginheight="0" marginwidth="0" title="Vote of No Confidence in Superintendent Dr. Robert Shaps"></iframe>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        // Your live Google Sheets CSV link
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTif9kpFENTSs10nUids_7CKozvj__dv8flbzr2hr7kTVdik0iHl3qOUS3HWxwhWNs73HevA1iq450Z/pub?gid=601182203&single=true&output=csv";

        let commentsArray = [];
        let currentIndex = 0;
        let carouselTimer;
        let isPaused = false;

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                
                let validSignatureCount = 0;

                // Loop through data to count total signatures and grab comments
                data.forEach(row => {
                    // Check if the row has any data at all (ignores trailing empty rows from Google Sheets)
                    if (Object.values(row).join('').trim() !== '') {
                        validSignatureCount++;
                    }

                    // Look strictly for the 'Comments' column and ensure it isn't empty
                    if(row['Comments'] && row['Comments'].trim() !== '') {
                        // We format the comment elegantly with quotes
                        commentsArray.push(`<span class="comment-text">"${row['Comments'].trim()}"</span>`);
                    }
                });

                // Update the total supporter count on the page
                document.getElementById('signature-count').innerText = validSignatureCount.toLocaleString();

                // If there are valid comments, start the carousel
                if(commentsArray.length > 0) {
                    showComment(0);
                    startTimer();
                } else {
                    document.getElementById('active-comment').innerHTML = "<span class='comment-text'>Be the first to leave a comment!</span>";
                }
            }
        });

        function showComment(index) {
            if(commentsArray.length === 0) return;
            
            if(index >= commentsArray.length) currentIndex = 0;
            else if(index < 0) currentIndex = commentsArray.length - 1;
            else currentIndex = index;

            document.getElementById('active-comment').innerHTML = commentsArray[currentIndex];
        }

        function startTimer() {
            carouselTimer = setInterval(() => {
                if(!isPaused) showComment(currentIndex + 1);
            }, 7000); 
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
            resetTimer(); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
            resetTimer();
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? '▶' : '⏸';
            e.target.title = isPaused ? 'Play' : 'Pause';
        });

        function resetTimer() {
            clearInterval(carouselTimer);
            startTimer();
        }
    </script>

</body>
</html>
