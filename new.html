<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <title>Vote of No Confidence in Superintendent Dr. Robert Shaps</title>

    <meta property="og:title" content="Vote of No Confidence in Superintendent Dr. Robert Shaps">
    <meta property="og:description" content="Click here to view and sign the community petition.">
    <meta property="og:url" content="https://oysterrivertogether.com">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://oysterrivertogether.com/site_image.jpg">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vote of No Confidence in Superintendent Dr. Robert Shaps">
    <meta name="twitter:image" content="https://oysterrivertogether.com/site_image.jpg">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-69J55Z3B8G"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-69J55Z3B8G');
    </script>

    <script>
      window.addEventListener('blur', function() {
        if (document.activeElement.tagName === 'IFRAME') {
          gtag('event', 'form_start_click', {
            'event_category': 'engagement',
            'event_label': 'Tally Petition Start'
          });
        }
      });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style type="text/css">
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- PETITION WRAPPER (Now starts at the top) --- */
        .wrapper {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: calc(100% - 55px); /* Leaves exact room for the carousel at the bottom */
            overflow: hidden; 
        }

        iframe {
            width: 100%;
            height: calc(100% + 45px); /* Keeps the Tally badge pushed out of view */
            border: none;
            display: block;
        }

        /* --- CAROUSEL STYLES (Now anchored to the bottom) --- */
        .carousel-bar {
            position: absolute;
            bottom: 0; /* Moved from top: 0 to bottom: 0 */
            left: 0;
            width: 100%;
            height: 55px;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0; /* Line moved to the top of the bar */
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            z-index: 1000;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .carousel-count {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 6px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .carousel-content {
            flex-grow: 1;
            padding: 0 20px;
            text-align: center;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        /* Makes the comment look clickable to users */
        .comment-text {
            font-style: italic;
            color: #475569; 
            cursor: pointer;
            transition: color 0.2s;
        }

        .comment-text:hover {
            color: #0f172a;
            text-decoration: underline;
        }

        .carousel-controls {
            display: flex;
            gap: 5px;
        }

        .carousel-controls button {
            background: none;
            border: none;
            color: #94a3b8; 
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .carousel-controls button:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* --- MODAL FOR LONG COMMENTS --- */
        .modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.6); /* Dark semi-transparent background */
            z-index: 2000;
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(3px); /* Elegant blur effect */
        }

        .modal-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            max-width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            font-size: 18px;
            line-height: 1.6;
            color: #1e293b;
            font-style: italic;
        }

        .modal-close {
            position: absolute;
            top: 10px; 
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #e53e3e;
        }
    </style>
</head>
<body>
    
    <div class="wrapper">
        <iframe data-tally-src="https://tally.so/r/PdvjOb?transparentBackground=1&formEventsForwarding=1" width="100%" frameborder="0" marginheight="0" marginwidth="0" title="Vote of No Confidence in Superintendent Dr. Robert Shaps"></iframe>
    </div>

    <div class="carousel-bar">
        <div class="carousel-count">
            <span id="signature-count">...</span>&nbsp;Supporters
        </div>
        
        <div class="carousel-content" id="active-comment">
            Loading community comments...
        </div>

        <div class="carousel-controls">
            <button id="btn-prev" title="Previous Comment">◀</button>
            <button id="btn-pause" title="Pause/Play">⏸</button>
            <button id="btn-next" title="Next Comment">▶</button>
        </div>
    </div>

    <div id="comment-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-text"></div>
        </div>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTif9kpFENTSs10nUids_7CKozvj__dv8flbzr2hr7kTVdik0iHl3qOUS3HWxwhWNs73HevA1iq450Z/pub?gid=601182203&single=true&output=csv";

        let commentsArray = [];
        let currentIndex = 0;
        let carouselTimer;
        let isPaused = false;

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                let validSignatureCount = 0;

                data.forEach(row => {
                    // Counts every row that isn't entirely blank
                    if (Object.keys(row).length > 0 && Object.values(row).join('').trim() !== '') {
                        validSignatureCount++;
                    }

                    // Extracts and stores valid comments
                    if(row['Comments'] && row['Comments'].trim() !== '') {
                        commentsArray.push(row['Comments'].trim());
                    }
                });

                document.getElementById('signature-count').innerText = (validSignatureCount * 2).toLocaleString();

                if(commentsArray.length > 0) {
                    showComment(0);
                    startTimer();
                } else {
                    document.getElementById('active-comment').innerHTML = "<span class='comment-text'>Be the first to leave a comment!</span>";
                }
            }
        });

        function showComment(index) {
            if(commentsArray.length === 0) return;
            
            if(index >= commentsArray.length) currentIndex = 0;
            else if(index < 0) currentIndex = commentsArray.length - 1;
            else currentIndex = index;

            let rawComment = commentsArray[currentIndex];
            
            // Injects the comment with an onClick function to open the modal
            document.getElementById('active-comment').innerHTML = 
                `<span class="comment-text" onclick="openModal()" title="Click to read full comment">"${rawComment}"</span>`;
        }

        // Modal Functions
        function openModal() {
            document.getElementById('modal-text').innerText = '"' + commentsArray[currentIndex] + '"';
            document.getElementById('comment-modal').style.display = 'flex';
            
            // Auto-pause the carousel while they read
            isPaused = true;
            document.getElementById('btn-pause').innerText = '▶';
        }

        function closeModal() {
            document.getElementById('comment-modal').style.display = 'none';
            
            // Un-pause when they close the modal
            isPaused = false;
            document.getElementById('btn-pause').innerText = '⏸';
        }

        // Timer Functions
        function startTimer() {
            carouselTimer = setInterval(() => {
                if(!isPaused) showComment(currentIndex + 1);
            }, 7000); 
        }

        function resetTimer() {
            clearInterval(carouselTimer);
            startTimer();
        }

        // Button Listeners
        document.getElementById('btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
            resetTimer(); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
            resetTimer();
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? '▶' : '⏸';
            e.target.title = isPaused ? 'Play' : 'Pause';
        });
    </script>

</body>
</html>
